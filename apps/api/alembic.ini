# Alembic configuration file
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# The database URL is injected at runtime from the environment.
# Leave this blank — env.py reads from app.core.config.
sqlalchemy.url =

[post_write_hooks]
# Optionally run ruff on generated migrations
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
